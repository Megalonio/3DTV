<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>3D TV Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; height:100%; overflow:hidden; background:#0a0e14; }
  #container { position:absolute; inset:0; }
  #techGrid {
    position:absolute; inset:-100%; z-index:0;
    background-image:
      linear-gradient(rgba(47,224,255,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(47,224,255,0.18) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: techGridScroll 12s linear infinite;
  }
  @keyframes techGridScroll {
    from { transform: translate(0, 0); }
    to   { transform: translate(48px, 48px); }
  }
  #loading {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:sans-serif; font-size:16px; background:#111; z-index:10;
  }
  #srcCanvas, #crtCanvas { display:none; }
  #streamPanel {
    position:absolute; top:50%; right:4%; transform:translateY(-50%);
    z-index:6; width:230px; font-family:sans-serif; color:#eee;
    background:rgba(15,15,15,0.72); border:1px solid #555; border-radius:10px;
    padding:14px 16px; display:none; backdrop-filter: blur(2px);
  }
  #streamPanel label {
    display:block; font-size:11px; opacity:0.75; margin-bottom:8px; line-height:1.4;
  }
  #streamPanel input {
    width:100%; box-sizing:border-box; padding:7px 8px; border-radius:5px;
    border:1px solid #666; background:#111; color:#eee; font-size:12px;
  }
  #streamPanel button {
    margin-top:8px; width:100%; padding:7px; border-radius:5px; border:1px solid #666;
    background:#242424; color:#eee; cursor:pointer; font-size:12px;
  }
  #streamPanel button:hover { background:#333; }
  #streamStatus { margin-top:7px; font-size:11px; opacity:0.75; min-height:14px; }

  #recentSources { margin-top:10px; display:none; }
  #recentSourcesHead {
    display:flex; justify-content:space-between; align-items:center;
    font-size:10px; opacity:0.6; margin-bottom:5px;
  }
  #clearRecentBtn { cursor:pointer; text-decoration:underline; opacity:0.85; }
  #clearRecentBtn:hover { opacity:1; }
  #recentSourcesList { max-height:120px; overflow-y:auto; }
  .recentItem {
    display:flex; align-items:center; gap:6px; padding:5px 7px;
    margin-bottom:4px; border-radius:5px; background:rgba(255,255,255,0.06);
    cursor:pointer; font-size:11px;
  }
  .recentItem:hover { background:rgba(255,255,255,0.16); }
  .recentItem .recentLabel {
    flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .recentItem .recentRemove { opacity:0.5; flex-shrink:0; }
  .recentItem .recentRemove:hover { opacity:1; }
</style>
</head>

<body>
<div id="techGrid"></div>
<div id="container"></div>
<div id="loading">Loading model…</div>

<div id="streamPanel">
  <label for="streamUrlInput">Play a link on the TV — .m3u/.m3u8 stream, an IPTV channel list, or a direct .mp4. Up/Down switches channels if a list loads.</label>
  <input id="streamUrlInput" type="text" placeholder="https://example.com/video.mp4" autocomplete="off">
  <button id="streamLoadBtn">Play</button>
  <div id="streamStatus"></div>
  <div id="recentSources">
    <div id="recentSourcesHead">
      <span>Recent</span>
      <span id="clearRecentBtn">clear</span>
    </div>
    <div id="recentSourcesList"></div>
  </div>
</div>

<canvas id="srcCanvas" width="256" height="240"></canvas>
<canvas id="crtCanvas" width="512" height="480"></canvas>
<video id="vid" style="display:none" playsinline loop crossorigin="anonymous"></video>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { RectAreaLightUniformsLib } from "three/addons/lights/RectAreaLightUniformsLib.js";

/* ---- PART 1: original CRT pipeline (video -> NES-res canvas -> WebGL shader) ---- */

const vid = document.getElementById('vid');
const src = document.getElementById('srcCanvas');
const sctx = src.getContext('2d');
const crtCanvas = document.getElementById('crtCanvas');

// TV starts off; loads only once a link is pasted in (see loadStreamUrl).
// Jumps to a random point on load, except live streams (no duration to seek into).
vid.addEventListener('loadedmetadata', () => {
  if (Number.isFinite(vid.duration) && vid.duration > 0){
    vid.currentTime = Math.random() * vid.duration;
  }
  vid.play().catch(()=>{});
});

// Channel surfing: click the screen to "flip" channel with a static burst +
// random seek. If a .m3u/.m3u8 channel list loaded, Up/Down step through it
// via changeChannelBy() instead (channelList/channelIndex, see parseChannelList()).
let channelNum = 2 + (Math.random() * 82 | 0);
let channelShownAt = performance.now();
let staticUntil = 0;
let channelList = null;   // array of {name, url}, or null if nothing multi-channel is loaded
let channelIndex = 0;

function flashStatic(durationMs){
  staticUntil = performance.now() + durationMs;
}

function surfChannel(){
  if (!channelList) channelNum = 2 + (Math.random() * 82 | 0);
  channelShownAt = performance.now();
  flashStatic(350);
  if (vid.readyState >= 2 && Number.isFinite(vid.duration) && vid.duration > 0){
    vid.currentTime = Math.random() * vid.duration;
    vid.play().catch(()=>{});
  }
}

function drawStatic(){
  const id = sctx.createImageData(256, 240);
  const d = id.data;
  for(let i = 0; i < d.length; i += 4){
    const v = Math.random() * 255 | 0;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }
  sctx.putImageData(id, 0, 0);
}

function drawChannelOSD(){
  const age = performance.now() - channelShownAt;
  const holdMs = 1800, fadeMs = 700;
  if(age > holdMs + fadeMs) return;
  const alpha = age <= holdMs ? 1 : 1 - (age - holdMs) / fadeMs;

  const txt = channelList
    ? 'CH ' + String(channelIndex + 1).padStart(2, '0')
    : 'CH ' + String(channelNum).padStart(2, '0');
  sctx.save();
  sctx.globalAlpha = alpha;
  sctx.font = 'bold 32px "VT323", "Courier New", monospace';
  sctx.textBaseline = 'top';
  sctx.imageSmoothingEnabled = false;
  const x = 256 - 10 - sctx.measureText(txt).width;
  const y = 10;
  sctx.fillStyle = '#000';
  sctx.fillText(txt, x+2, y+2);
  sctx.fillStyle = '#33ff33';
  sctx.fillText(txt, x, y);

  // Channel name under the number, only for a real multi-channel list.
  if (channelList && channelList[channelIndex]){
    const name = channelList[channelIndex].name;
    sctx.font = '16px "VT323", "Courier New", monospace';
    const nx = 256 - 10 - sctx.measureText(name).width;
    const ny = y + 30;
    sctx.fillStyle = '#000';
    sctx.fillText(name, nx+1, ny+1);
    sctx.fillStyle = '#33ff33';
    sctx.fillText(name, nx, ny);
  }
  sctx.restore();
}

const NES_FPS = 60.0988;
const frameMs = 1000 / NES_FPS;
let lastDraw = 0;
function captureLoop(t){
  if(t - lastDraw >= frameMs){
    lastDraw = t;
    sctx.fillStyle = '#000';
    sctx.fillRect(0, 0, 256, 240);
    if(performance.now() < staticUntil){
      drawStatic();
    } else if(vid.readyState >= 2){
      sctx.drawImage(vid, 0, 0, 256, 240);
    }
    drawChannelOSD();
  }
  requestAnimationFrame(captureLoop);
}


const W = 256, H = 240;
let crtGl = crtCanvas.getContext('webgl') || crtCanvas.getContext('experimental-webgl');
let crtProgram, crtTexture, crtUniforms, crtReady = false;

function compileShader(gl, srcCode, type){
  const sh = gl.createShader(type);
  gl.shaderSource(sh, srcCode);
  gl.compileShader(sh);
  if(!gl.getShaderParameter(sh, gl.COMPILE_STATUS)){
    console.warn('shader error:', gl.getShaderInfoLog(sh));
    return null;
  }
  return sh;
}

function initCRT(){
  const gl = crtGl;
  if(!gl) return;
  gl.getExtension('OES_standard_derivatives');

  const vsSrc = `
    attribute vec2 a_pos;
    varying vec2 v_uv;
    void main(){
      v_uv = a_pos * 0.5 + 0.5;
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  `;
  const fsSrc = `
    #extension GL_OES_standard_derivatives : enable
    precision mediump float;
    varying vec2 v_uv;
    uniform sampler2D u_tex;
    uniform vec2 u_srcRes;
    uniform float u_curvature;
    uniform float u_scanline;
    uniform float u_vignette;
    uniform float u_mask;

    vec2 barrel(vec2 uv, float k){
      vec2 cc = uv - 0.5;
      float r2 = dot(cc, cc);
      return uv + cc * r2 * k;
    }

    void main(){
      vec2 uv = barrel(v_uv, u_curvature);
      if(uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0){
        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
        return;
      }

      vec2 caDir = (uv - 0.5) * 0.0028;
      float r = texture2D(u_tex, uv + caDir).r;
      float g = texture2D(u_tex, uv).g;
      float b = texture2D(u_tex, uv - caDir).b;
      vec3 color = vec3(r, g, b);

      float sl = sin(uv.y * u_srcRes.y * 3.14159265);
      float scanMul = mix(1.0, 0.45 + 0.55 * abs(sl), u_scanline);
      color *= scanMul;

      float col = mod(gl_FragCoord.x, 3.0);
      vec3 maskColor = (col < 1.0) ? vec3(1.1, 0.85, 0.9)
                      : (col < 2.0) ? vec3(0.85, 1.1, 0.85)
                                    : vec3(0.9, 0.85, 1.1);
      color *= mix(vec3(1.0), maskColor, u_mask);

      vec2 vc = v_uv - 0.5;
      float vig = 1.0 - dot(vc, vc) * u_vignette;
      color *= vig;

      gl_FragColor = vec4(color, 1.0);
    }
  `;

  const vs = compileShader(gl, vsSrc, gl.VERTEX_SHADER);
  const fs = compileShader(gl, fsSrc, gl.FRAGMENT_SHADER);
  if(!vs || !fs) return;

  crtProgram = gl.createProgram();
  gl.attachShader(crtProgram, vs);
  gl.attachShader(crtProgram, fs);
  gl.linkProgram(crtProgram);
  if(!gl.getProgramParameter(crtProgram, gl.LINK_STATUS)){
    console.warn('link error:', gl.getProgramInfoLog(crtProgram));
    return;
  }

  const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(crtProgram, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  crtTexture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, crtTexture);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  crtUniforms = {
    tex: gl.getUniformLocation(crtProgram, 'u_tex'),
    srcRes: gl.getUniformLocation(crtProgram, 'u_srcRes'),
    curvature: gl.getUniformLocation(crtProgram, 'u_curvature'),
    scanline: gl.getUniformLocation(crtProgram, 'u_scanline'),
    vignette: gl.getUniformLocation(crtProgram, 'u_vignette'),
    mask: gl.getUniformLocation(crtProgram, 'u_mask')
  };
  crtReady = true;
}
initCRT();

function drawCRTFrame(){
  if(!crtReady) return;
  const gl = crtGl;
  gl.viewport(0, 0, crtCanvas.width, crtCanvas.height);
  gl.useProgram(crtProgram);
  gl.bindTexture(gl.TEXTURE_2D, crtTexture);
  try {
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, src);
  } catch (err){
    // Some hosts let the video play but stay CORS-tainted for pixel access;
    // that only surfaces here (WebGL upload), so fall back to no-CRT mode.
    console.warn('Video CORS-tainted, switching to no-CRT fallback:', err);
    setCrtFallback(true);
    if (!/no CRT effect/.test(streamStatus.textContent)){
      streamStatus.textContent += ' (no CRT effect — source doesn\'t support it)';
    }
    return;
  }
  gl.uniform1i(crtUniforms.tex, 0);
  gl.uniform2f(crtUniforms.srcRes, W, H);
  gl.uniform1f(crtUniforms.curvature, 0.30);
  gl.uniform1f(crtUniforms.scanline, 0.55);
  gl.uniform1f(crtUniforms.vignette, 0.30);
  gl.uniform1f(crtUniforms.mask, 0.20);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

requestAnimationFrame(captureLoop);

/* ---- PART 2: Three.js scene, CRT canvas mapped onto the 3D "Screen" mesh ---- */

RectAreaLightUniformsLib.init();

const container = document.getElementById('container');
const scene = new THREE.Scene();
// No opaque background — lets the CSS scrolling tech grid behind the canvas show through.

// Detected early (moved up from the touch-controls section below) so the
// renderer can pick mobile-friendly settings from the start.
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

// ---- 3D house the TV sits inside, loaded from Room.glb (next to
// House scaling: its own units differ from the furniture's normalized scale,
// so it needs scale + floor alignment. Values below are tuned by eye.
const HOUSE_SCALE = 40;
const HOUSE_FLOOR_Y = -20;
const HOUSE_OFFSET_X = 0;
const HOUSE_OFFSET_Z = 0;

// Where the TV sits in the room. World-space offset applied after centering/scaling.
const TV_POSITION = new THREE.Vector3(-125, 14, -90);
// Radians; TV-mode camera below assumes the screen faces +Z.
let TV_ROTATION_Y = 4.71;

// Registry of nudge-able items in placement mode.
const placeableItems = [];

function registerPlaceable(name, object3D, placement, rotationY){
  const item = {
    name,
    object: object3D,
    basePosition: object3D.position.clone(),
    placement,
    rotationY,
    rawPlacement: placement.clone() // smooth float accumulator; `placement` stays snapped to whole numbers
  };
  placeableItems.push(item);
  applyPlaceableTransform(item);
  return item;
}

function applyPlaceableTransform(item){
  item.object.position.copy(item.basePosition).add(item.placement);
  item.object.rotation.y = item.rotationY;
}

const houseLoader = new GLTFLoader();
if (false){
  houseLoader.load('Room.glb', (gltf) => {
    const house = gltf.scene;

    const box = new THREE.Box3().setFromObject(house);
    const size = new THREE.Vector3();
    box.getSize(size);
    const center = new THREE.Vector3();
    box.getCenter(center);

    house.scale.setScalar(HOUSE_SCALE);
    house.position.set(
      HOUSE_OFFSET_X - HOUSE_SCALE * center.x,
      HOUSE_FLOOR_Y - HOUSE_SCALE * box.min.y,
      HOUSE_OFFSET_Z - HOUSE_SCALE * center.z
    );

    scene.add(house);
    console.log('House native size:', size, '-> scaled size:', size.clone().multiplyScalar(HOUSE_SCALE));
  }, undefined, (err) => {
    console.error('Error loading Room.glb:', err);
  });
}

// TV Stand intentionally not loaded — skipping TVStand.glb entirely to save
// on load time / GPU memory. Re-add a loader here if it's ever needed again.

// Single orthographic camera shared by all modes — only position/rotation/
// frustum change between them, to avoid a visible snap on mode switch.
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 2000);
camera.position.set(0, -2, 60);

// Mobile GPUs: disable AA and cap pixel ratio lower.
const renderer = new THREE.WebGLRenderer({ antialias: !isTouchDevice, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isTouchDevice ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
keyLight.position.set(5, 8, 10);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
fillLight.position.set(-6, -2, -8);
scene.add(fillLight);

// Screen "light spill": fakes CRT glow onto the bezel using a RectAreaLight
// sized to the screen and colored from a live sample of the picture.
let screenGlowLight = null;
let screenGlowNormal = new THREE.Vector3(0, 0, 1);
const glowSampleCanvas = document.createElement('canvas');
glowSampleCanvas.width = 8;
glowSampleCanvas.height = 8;
const glowSampleCtx = glowSampleCanvas.getContext('2d', { willReadFrequently: true });

function sampleScreenColor(){
  glowSampleCtx.drawImage(crtCanvas, 0, 0, 8, 8);
  const data = glowSampleCtx.getImageData(0, 0, 8, 8).data;
  let r = 0, g = 0, b = 0;
  const n = data.length / 4;
  for (let i = 0; i < data.length; i += 4){
    r += data[i]; g += data[i + 1]; b += data[i + 2];
  }
  return { r: r / n / 255, g: g / n / 255, b: b / n / 255 };
}

function computeMeshNormal(mesh){
  const geo = mesh.geometry;
  const normalAttr = geo.attributes.normal;
  const normal = new THREE.Vector3(0, 0, 1);
  if (normalAttr && normalAttr.count){
    normal.set(0, 0, 0);
    for (let i = 0; i < normalAttr.count; i++){
      normal.x += normalAttr.getX(i);
      normal.y += normalAttr.getY(i);
      normal.z += normalAttr.getZ(i);
    }
    normal.divideScalar(normalAttr.count);
    if (normal.lengthSq() < 1e-6) normal.set(0, 0, 1);
    normal.normalize();
  }
  const normalMatrix = new THREE.Matrix3().getNormalMatrix(mesh.matrixWorld);
  return normal.applyMatrix3(normalMatrix).normalize();
}

function setupScreenGlow(mesh){
  mesh.updateWorldMatrix(true, false);
  screenGlowNormal = computeMeshNormal(mesh);

  const box = new THREE.Box3().setFromObject(mesh);
  const size = new THREE.Vector3();
  box.getSize(size);
  const center = new THREE.Vector3();
  box.getCenter(center);

  // Approximate the screen's width/height as the two largest dimensions of
  // its bounding box (the smallest one is the thin "depth" axis).
  const dims = [size.x, size.y, size.z].sort((a, b) => a - b);
  const glowWidth = dims[2];
  const glowHeight = dims[1];

  screenGlowLight = new THREE.RectAreaLight(0xffffff, 0, glowWidth, glowHeight);
  screenGlowLight.position.copy(center).addScaledVector(screenGlowNormal, Math.max(glowWidth, glowHeight) * 0.08);
  screenGlowLight.lookAt(center.clone().addScaledVector(screenGlowNormal, 1));
  scene.add(screenGlowLight);

  // A small point light fills in softer, omnidirectional bounce that the
  // directional RectAreaLight alone won't reach around tight bezel corners.
  screenGlowLight.userData.fillLight = new THREE.PointLight(0xffffff, 0, glowWidth * 3);
  screenGlowLight.userData.fillLight.position.copy(screenGlowLight.position);
  scene.add(screenGlowLight.userData.fillLight);
}

let glowFrame = 0;
function updateScreenGlow(){
  if (!screenGlowLight) return;
  glowFrame++;
  if (glowFrame % 3 !== 0) return; // sampling every frame is unnecessary work

  const { r, g, b } = sampleScreenColor();
  const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;

  screenGlowLight.color.setRGB(Math.max(r, 0.01), Math.max(g, 0.01), Math.max(b, 0.01));
  screenGlowLight.intensity = luminance * 6.0;

  const fill = screenGlowLight.userData.fillLight;
  fill.color.copy(screenGlowLight.color);
  fill.intensity = luminance * 4.0;
}

// Camera modes: 'freeroam' (isometric, snaps to 4 corner angles),
// 'tv' (locked close-up on the screen), 'transitioning' (animated hand-off).
let mode = 'freeroam';

const tvControls = new OrbitControls(camera, renderer.domElement);
tvControls.enableDamping = true;
tvControls.dampingFactor = 0.08;

// Rotation disabled so the TV never spins/tilts. Pan (which is what moves
// the camera height/target here) is gated behind placement mode — regular
// users only get zoom; height adjustment is a placement-mode-only privilege,
// synced each frame in animate() via tvControls.enablePan = placementMode.
tvControls.enableRotate = false;
tvControls.enablePan = false;
tvControls.screenSpacePanning = true;
tvControls.panSpeed = 1.2;
tvControls.minZoom = 0.6;
tvControls.maxZoom = 3;
tvControls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
tvControls.touches = { ONE: THREE.TOUCH.PAN, TWO: THREE.TOUCH.DOLLY_PAN };
tvControls.enabled = false;

// Remembers TV camera pose across mode switches so re-entering TV view
// restores where you left it.
const savedTVCamera = {
  height: 17.5,
  distance: 55,
  targetX: TV_POSITION.x,
  targetZ: TV_POSITION.z,
  zoom: 1
};

// Half-height of the TV close-up's orthographic frustum at 1x zoom — tune
// this like the other constants (smaller = tighter framing on the screen).
const TV_ORTHO_VIEW_SIZE = 23;

// "View size" = half-height of the frustum (smaller = more zoomed in).
let lastRawViewSize = 140;
function setOrthoFrustum(viewSize){
  lastRawViewSize = viewSize;
  const aspect = window.innerWidth / window.innerHeight;
  camera.left = -viewSize * aspect;
  camera.right = viewSize * aspect;
  camera.top = viewSize;
  camera.bottom = -viewSize;
  camera.updateProjectionMatrix();
}

// Isometric view tuning constants.
const ISO_TARGET = TV_POSITION.clone();
const ISO_DISTANCE = 220;
const ISO_ELEVATION_DEG = 35.264;
const ISO_BASE_AZIMUTH_DEG = 45; // the first corner's compass angle

const ISO_ORTHO_VIEW_SIZE_BASE = 140; // half-height of the orthographic frustum at 1x zoom
const ISO_ZOOM_MIN = 0.35; // most zoomed-in (smallest view size)
const ISO_ZOOM_MAX = 2.2;  // most zoomed-out (largest view size)
const ISO_ZOOM_SPEED = 0.0012; // multiplier applied per pixel of wheel delta
let isoZoom = ISO_ZOOM_MIN;

setOrthoFrustum(ISO_ORTHO_VIEW_SIZE_BASE * isoZoom);

// Wheel/trackpad zoom for iso view.
function onIsoWheel(e){
  if (mode !== 'freeroam') return;
  e.preventDefault();
  isoZoom = THREE.MathUtils.clamp(isoZoom * (1 + e.deltaY * ISO_ZOOM_SPEED), ISO_ZOOM_MIN, ISO_ZOOM_MAX);
  setOrthoFrustum(ISO_ORTHO_VIEW_SIZE_BASE * isoZoom);
}
renderer.domElement.addEventListener('wheel', onIsoWheel, { passive: false });

// Shifts ISO_TARGET around in placement mode; the room itself never moves.
const isoPanOffset = new THREE.Vector3(0, 0, 0);

// Current iso camera compass angle in degrees; snaps to 90° increments
// from ISO_BASE_AZIMUTH_DEG when not actively dragging (see updateIsoSnap()).
let isoAzimuthDeg = ISO_BASE_AZIMUTH_DEG;

// Scratch pose for iso camera math, used even while TV mode owns `camera`.
const isoPose = new THREE.Object3D();
isoPose.isCamera = true; // makes lookAt() use camera convention, not Object3D's

function applyIsoCameraPose(azimuthDeg, writeToCamera = true){
  const az = THREE.MathUtils.degToRad(azimuthDeg);
  const el = THREE.MathUtils.degToRad(ISO_ELEVATION_DEG);
  const offset = new THREE.Vector3(
    Math.cos(el) * Math.sin(az),
    Math.sin(el),
    Math.cos(el) * Math.cos(az)
  ).multiplyScalar(ISO_DISTANCE);
  const target = ISO_TARGET.clone().add(isoPanOffset);
  isoPose.position.copy(target).add(offset);
  isoPose.up.set(0, 1, 0);
  isoPose.lookAt(target);
  if (writeToCamera){
    camera.position.copy(isoPose.position);
    camera.quaternion.copy(isoPose.quaternion);
  }
}
applyIsoCameraPose(isoAzimuthDeg);

const moveState = { forward: false, back: false, left: false, right: false, up: false, down: false };
const WALK_SPEED = 60; // world units / second — used for placement-mode panning
const clock = new THREE.Clock();

function onKeyDown(e){
  switch (e.code){
    // These just set flags here; updateFreeRoam() only ever acts on them
    // while placementMode is on (see below) — otherwise the default view
    // is a fixed pose and they're inert.
    case 'KeyW': case 'ArrowUp': moveState.forward = true; break;
    case 'KeyS': case 'ArrowDown': moveState.back = true; break;
    case 'KeyA': case 'ArrowLeft': moveState.left = true; break;
    case 'KeyD': case 'ArrowRight': moveState.right = true; break;
    case 'Space': moveState.up = true; break;
    case 'ShiftLeft': case 'ShiftRight': moveState.down = true; break;
    case 'Escape': if (mode === 'tv') exitTVMode(); break;
    case 'KeyC':
      isoPanOffset.copy(TV_POSITION).sub(ISO_TARGET);
      isoZoom = ISO_ZOOM_MIN;
      setOrthoFrustum(ISO_ORTHO_VIEW_SIZE_BASE * isoZoom);
      applyIsoCameraPose(isoAzimuthDeg);
      break;
  }
}
function onKeyUp(e){
  switch (e.code){
    case 'KeyW': case 'ArrowUp': moveState.forward = false; break;
    case 'KeyS': case 'ArrowDown': moveState.back = false; break;
    case 'KeyA': case 'ArrowLeft': moveState.left = false; break;
    case 'KeyD': case 'ArrowRight': moveState.right = false; break;
    case 'Space': moveState.up = false; break;
    case 'ShiftLeft': case 'ShiftRight': moveState.down = false; break;
  }
}
document.addEventListener('keydown', onKeyDown);
document.addEventListener('keyup', onKeyUp);

// ---- Live placement mode ----
// Press P (in free-roam) to toggle it, Tab to switch which registered item
// you're moving (TV, TV Stand, anything added later). While it's on:
//   I / K / J / L  — move forward / back / left / right (snaps to whole
//                    numbers — no fractional coordinates like 10.4)
//   U / O          — move up / down (same whole-number snapping)
//   N / M          — rotate (snaps to 1 of 8 directions, 45° apart — like
//                    an arcade stick: 4 walls-facing + 4 corners. This keeps
//                    "against the wall" angles exact instead of eyeballed
//                    decimals that are close-but-not-quite-square.)
// The HUD shows the running placement/rotation for whichever item is
// selected — once it looks right, copy those numbers into that item's
// constants up top.
let placementMode = false;
let activeItemIndex = 0;
const PLACEMENT_MOVE_SPEED = 20;  // units / second
const PLACEMENT_ROTATE_STEP = Math.PI / 4; // 45° per key press — 8 snap positions total
const placementState = { fwd: false, back: false, left: false, right: false, up: false, down: false };

// Snaps a rotation (radians) to the nearest 45° increment.
function snapRotationToOctant(radians){
  return Math.round(radians / PLACEMENT_ROTATE_STEP) * PLACEMENT_ROTATE_STEP;
}

// Deliberately NOT on WASD/arrows — those already walk the character, so
// reusing them for placement would move you and the item at the same time.
function onPlacementKeyDown(e){
  if (e.code === 'KeyP'){
    placementMode = !placementMode;
    if (placementMode) overscanAdjustMode = false;
    else if (isoDragging) onIsoDragUp(); // don't leave rotation stuck mid-drag
    return;
  }
  if (!placementMode) return;
  if (e.code === 'Tab'){
    e.preventDefault();
    if (placeableItems.length > 0) activeItemIndex = (activeItemIndex + 1) % placeableItems.length;
    return;
  }
  switch (e.code){
    case 'KeyI': placementState.fwd = true; e.preventDefault(); break;
    case 'KeyK': placementState.back = true; e.preventDefault(); break;
    case 'KeyJ': placementState.left = true; e.preventDefault(); break;
    case 'KeyL': placementState.right = true; e.preventDefault(); break;
    case 'KeyU': placementState.up = true; e.preventDefault(); break;
    case 'KeyO': placementState.down = true; e.preventDefault(); break;
    case 'KeyN': {
      // Discrete step on keydown only (not held) — one press = one snap.
      if (placeableItems.length > 0){
        const item = placeableItems[activeItemIndex];
        item.rotationY = snapRotationToOctant(item.rotationY) - PLACEMENT_ROTATE_STEP;
        applyPlaceableTransform(item);
      }
      break;
    }
    case 'KeyM': {
      if (placeableItems.length > 0){
        const item = placeableItems[activeItemIndex];
        item.rotationY = snapRotationToOctant(item.rotationY) + PLACEMENT_ROTATE_STEP;
        applyPlaceableTransform(item);
      }
      break;
    }
  }
}
function onPlacementKeyUp(e){
  switch (e.code){
    case 'KeyI': placementState.fwd = false; break;
    case 'KeyK': placementState.back = false; break;
    case 'KeyJ': placementState.left = false; break;
    case 'KeyL': placementState.right = false; break;
    case 'KeyU': placementState.up = false; break;
    case 'KeyO': placementState.down = false; break;
  }
}
document.addEventListener('keydown', onPlacementKeyDown);
document.addEventListener('keyup', onPlacementKeyUp);

function updatePlacement(delta){
  if (!placementMode || placeableItems.length === 0) return;
  const item = placeableItems[activeItemIndex];
  const step = PLACEMENT_MOVE_SPEED * delta;
  if (placementState.fwd) item.rawPlacement.z -= step;
  if (placementState.back) item.rawPlacement.z += step;
  if (placementState.left) item.rawPlacement.x -= step;
  if (placementState.right) item.rawPlacement.x += step;
  if (placementState.up) item.rawPlacement.y += step;
  if (placementState.down) item.rawPlacement.y -= step;
  // Snap the applied placement to whole numbers — rawPlacement keeps the
  // exact float total so held keys don't feel stuck between integers.
  item.placement.set(
    Math.round(item.rawPlacement.x),
    Math.round(item.rawPlacement.y),
    Math.round(item.rawPlacement.z)
  );
  applyPlaceableTransform(item);
}

// Isometric camera: drag-to-rotate, snaps to nearest of 4 fixed corners on release.
let isoDragging = false;
let isoDragStartX = 0;
let isoDragStartAzimuth = 0;

// Eased hand-off from drag release to the snapped corner (isoSnapT >= 1 = done).
let isoSnapFrom = 0, isoSnapTo = 0, isoSnapT = 1;
const ISO_SNAP_DURATION = 0.35;
const ISO_DRAG_SENSITIVITY = 0.25; // degrees rotated per pixel dragged

function onIsoDragDown(e){
  if (mode !== 'freeroam' || !placementMode) return;
  if (e.target.closest && e.target.closest('#streamPanel')) return;
  isoDragging = true;
  isoDragStartX = e.clientX;
  isoDragStartAzimuth = isoAzimuthDeg;
  isoSnapT = 1; // cancel any snap animation still finishing from a previous drag
}
function onIsoDragMove(e){
  if (!isoDragging) return;
  const dx = e.clientX - isoDragStartX;
  isoAzimuthDeg = isoDragStartAzimuth - dx * ISO_DRAG_SENSITIVITY;
  applyIsoCameraPose(isoAzimuthDeg);
}
function onIsoDragUp(){
  if (!isoDragging) return;
  isoDragging = false;
  const rel = isoAzimuthDeg - ISO_BASE_AZIMUTH_DEG;
  const nearestCorner = Math.round(rel / 90);
  isoSnapFrom = isoAzimuthDeg;
  isoSnapTo = ISO_BASE_AZIMUTH_DEG + nearestCorner * 90;
  isoSnapT = 0;
}
renderer.domElement.addEventListener('pointerdown', onIsoDragDown);
window.addEventListener('pointermove', onIsoDragMove);
window.addEventListener('pointerup', onIsoDragUp);

// Eases isoAzimuthDeg to the snapped corner after drag release.
function updateIsoSnap(delta){
  if (isoSnapT >= 1) return;
  isoSnapT = Math.min(isoSnapT + delta / ISO_SNAP_DURATION, 1);
  const eased = isoSnapT * isoSnapT * (3 - 2 * isoSnapT); // smoothstep
  isoAzimuthDeg = isoSnapFrom + (isoSnapTo - isoSnapFrom) * eased;
  applyIsoCameraPose(isoAzimuthDeg);
}

// Placement mode pans the view (WASD/arrows + Space/Shift), relative to
// current facing direction.
function updateFreeRoam(delta){
  if (!placementMode) return;
  const step = WALK_SPEED * delta;
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();
  const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();

  const kbForward = (moveState.forward ? 1 : 0) - (moveState.back ? 1 : 0);
  const kbRight = (moveState.right ? 1 : 0) - (moveState.left ? 1 : 0);
  let moved = false;
  if (kbForward !== 0){ isoPanOffset.addScaledVector(forward, kbForward * step); moved = true; }
  if (kbRight !== 0){ isoPanOffset.addScaledVector(right, kbRight * step); moved = true; }
  if (moveState.up){ isoPanOffset.y += step; moved = true; }
  if (moveState.down){ isoPanOffset.y -= step; moved = true; }
  if (moved) applyIsoCameraPose(isoAzimuthDeg);
}

camHud.id = 'camHud';

// Recently-loaded sources, stored in localStorage (client-only, no server).
const RECENT_SOURCES_KEY = 'tv3d.recentSources.v1';
const MAX_RECENT_SOURCES = 8;
const recentSourcesList = document.getElementById('recentSourcesList');
const clearRecentBtn = document.getElementById('clearRecentBtn');

function readRecentSources(){
  try {
    const list = JSON.parse(localStorage.getItem(RECENT_SOURCES_KEY) || '[]');
    return Array.isArray(list) ? list : [];
  } catch (err){
    return []; // private/incognito localStorage can throw; treat as empty
  }
}

function writeRecentSources(list){
  try {
    localStorage.setItem(RECENT_SOURCES_KEY, JSON.stringify(list));
  } catch (err){
    console.warn('Could not save recent sources (localStorage unavailable or full):', err);
  }
}

// Host + path only (no query string), so credentials in the URL aren't shown.
function shortSourceLabel(url){
  try {
    const u = new URL(url);
    return u.hostname + (u.pathname !== '/' ? u.pathname : '');
  } catch {
    return url;
  }
}

function renderRecentSources(){
  const list = readRecentSources();
  recentSourcesList.parentElement.style.display = list.length ? 'block' : 'none';
  recentSourcesList.innerHTML = '';
  for (const url of list){
    const row = document.createElement('div');
    row.className = 'recentItem';
    row.title = url;

    const label = document.createElement('span');
    label.className = 'recentLabel';
    label.textContent = shortSourceLabel(url);
    row.appendChild(label);

    const remove = document.createElement('span');
    remove.className = 'recentRemove';
    remove.textContent = '✕';
    remove.title = 'Remove from recent';
    remove.addEventListener('click', (e) => {
      e.stopPropagation(); // don't also trigger the row's own click-to-load
      writeRecentSources(readRecentSources().filter((u) => u !== url));
      renderRecentSources();
    });
    row.appendChild(remove);

    row.addEventListener('click', () => {
      streamUrlInput.value = url;
      loadStreamUrl(url);
    });
    recentSourcesList.appendChild(row);
  }
}

// Remembered on submit regardless of success (like browser address history).
function rememberRecentSource(url){
  const list = readRecentSources().filter((u) => u !== url);
  list.unshift(url);
  writeRecentSources(list.slice(0, MAX_RECENT_SOURCES));
  renderRecentSources();
}

clearRecentBtn.addEventListener('click', () => {
  writeRecentSources([]);
  renderRecentSources();
});

renderRecentSources(); // show whatever's left over from a previous visit

// CRT-fallback: some hosts don't send CORS headers, blocking pixel access.
// When that happens, skip the CRT pipeline and just show the raw <video>.
let crtFallbackActive = false;

function setCrtFallback(active){
  crtFallbackActive = active;
  if (active){
    vid.style.display = 'block';
    vid.style.position = 'fixed';
    vid.style.right = '16px';
    vid.style.bottom = '16px';
    vid.style.width = '360px';
    vid.style.maxWidth = '40vw';
    vid.style.zIndex = '20';
    vid.style.background = '#000';
    vid.style.border = '2px solid rgba(255,255,255,0.35)';
    vid.style.borderRadius = '6px';
    vid.controls = true;
  } else {
    vid.style.display = 'none';
    vid.removeAttribute('controls');
  }
}

// Loading a user-supplied link: direct video files set as <video> src;
// HLS streams go through hls.js (native on Safari). Some "m3u8 links" are
// actually IPTV channel lists (many streams, one per channel) — those get
// parsed via parseChannelList() instead of played directly.
let hls = null;

// Broad match for m3u/m3u8-ish URLs, including Xtream-Codes get.php links
// without the extension. False positives are harmless — just gates the fetch.
function looksLikeM3U(url){
  return /\.m3u8?(\?|#|$)/i.test(url) || /[?&]type=m3u/i.test(url) || /get\.php\?/i.test(url);
}

// A real HLS playlist is also #EXTM3U, but carries HLS-specific tags
// (#EXT-X-STREAM-INF / #EXT-X-TARGETDURATION); a channel list has neither.
function parseChannelList(text){
  if (!/^\s*#EXTM3U/.test(text)) return null;
  if (/#EXT-X-STREAM-INF|#EXT-X-TARGETDURATION/.test(text)) return null;
  const lines = text.split(/\r?\n/);
  const channels = [];
  for (let i = 0; i < lines.length; i++){
    const line = lines[i].trim();
    if (!line.startsWith('#EXTINF')) continue;
    const name = (line.split(',').pop() || '').trim();
    let j = i + 1;
    while (j < lines.length && (lines[j].trim() === '' || lines[j].trim().startsWith('#'))) j++;
    const url = lines[j] && lines[j].trim();
    if (url) channels.push({ name: name || ('Channel ' + (channels.length + 1)), url });
  }
  return channels.length > 1 ? channels : null;
}

// ---- Proxying an entire HLS stream, not just its first request ----
//
// A CORS proxy that just swaps in a different URL (proxied(), defined
// alongside CORS_PROXIES below) is enough for a single direct file (.mp4
// etc.) — there's only ever one request. A genuine .m3u8 stream is a *tree*
// of requests instead: master playlist -> one or more variant/media
// playlists -> individual segments, plus occasional #EXT-X-KEY / #EXT-X-MAP
// URIs for encryption keys and init segments. hls.js resolves every URI it
// finds *inside* a playlist against wherever that playlist actually came
// from — and once a plain passthrough proxy has answered that fetch,
// "wherever it came from" (as far as the browser is concerned) is the
// proxy's own URL, not the real stream host. So any segment/sub-playlist
// path that's *relative* in the manifest resolves against the proxy instead
// of the origin and breaks — which is exactly how a stream can "work" for a
// moment (whatever *did* load correctly) and then fall back once something
// deeper in the tree comes back wrong, missing, or CORS-tainted.
//
// Fix: give hls.js a loader that (a) proxies every request it makes, not
// just the first, and (b) whenever a response looks like a playlist, first
// rewrites every URI reference inside it into an absolute, already-proxied
// URL — resolved against the *real* URL that playlist was fetched from
// (which this loader always knows, since it's the one doing the proxying).
// That way hls.js never has to guess a base to resolve against for the next
// request; everything it sees is already a complete, directly-fetchable
// link back through the same proxy. This cascades naturally through
// master -> variant playlist -> segments, since each is itself fetched
// through this same loader in turn.

function looksLikePlaylistText(text){
  return typeof text === 'string' && /^\s*#EXTM3U/.test(text);
}

// Rewrites every URI in a playlist (plain lines + URI="..." attributes)
// into an absolute, proxy-wrapped URL.
function rewritePlaylistUrls(text, base, prefix){
  const toProxied = (uri) => {
    try {
      return proxied(prefix, new URL(uri, base).href);
    } catch {
      return uri; // malformed URI — leave it alone rather than break playback
    }
  };
  return text.split(/\r?\n/).map((line) => {
    const trimmed = line.trim();
    if (!trimmed) return line;
    if (trimmed.startsWith('#')){
      return line.replace(/URI="([^"]+)"/, (_m, uri) => `URI="${toProxied(uri)}"`);
    }
    return toProxied(trimmed);
  }).join('\n');
}

// One hls.js loader class bound to a proxy prefix, covering manifest,
// variant playlists, tracks, keys, and fragments.
function makeHlsProxyLoader(BaseLoader, prefix){
  return class ProxyAwareLoader extends BaseLoader {
    load(context, config, callbacks){
      // Unwrap if already proxied, so we always know the true base URL.
      const realUrl = context.url.startsWith(prefix)
        ? decodeURIComponent(context.url.slice(prefix.length))
        : context.url;
      context.url = proxied(prefix, realUrl);

      const onSuccess = callbacks.onSuccess;
      callbacks.onSuccess = (response, stats, ctx, networkDetails) => {
        if (looksLikePlaylistText(response.data)){
          response = { ...response, data: rewritePlaylistUrls(response.data, realUrl, prefix) };
        }
        onSuccess(response, stats, ctx, networkDetails);
      };
      super.load(context, config, callbacks);
    }
  };
}

// Plays a URL on the <video> element — direct file or HLS (native Safari
// or hls.js). `prefix` is '' for unproxied, or a CORS_PROXIES entry.
async function loadIntoVideoElement(realUrl, prefix){
  if (hls){ hls.destroy(); hls = null; }
  vid.pause();
  vid.removeAttribute('src');
  vid.load();

  if (looksLikeM3U(realUrl)){
    if (vid.canPlayType('application/vnd.apple.mpegurl')){
      // Native HLS (Safari) — no hls.js, so sub-requests can't be intercepted.
      vid.src = prefix ? proxied(prefix, realUrl) : realUrl;
      await vid.play();
    } else {
      const { default: Hls } = await import('https://cdn.jsdelivr.net/npm/hls.js@1/+esm');
      if (!Hls.isSupported()) throw new Error('HLS not supported in this browser');
      hls = new Hls(prefix ? { loader: makeHlsProxyLoader(Hls.DefaultConfig.loader, prefix) } : {});
      hls.loadSource(realUrl);
      hls.attachMedia(vid);
      await new Promise((resolve, reject) => {
        hls.on(Hls.Events.MANIFEST_PARSED, resolve);
        hls.on(Hls.Events.ERROR, (_evt, data) => { if (data.fatal) reject(new Error(data.type)); });
      });
      await vid.play();
    }
  } else {
    vid.src = prefix ? proxied(prefix, realUrl) : realUrl;
    await vid.play();
  }
}

// Plays a media URL: tries direct with CORS first (needed for the CRT
// effect), then each CORS proxy in order, then direct without CORS as a
// last resort (works, but skips the CRT effect).
// First proxy is a dedicated Cloudflare Worker; the rest are public
// fallbacks in case one gets blocked by a given host.
const CORS_PROXIES = [
  'https://broken-paper-d384.kcmegalonio.workers.dev/?url=',
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url=',
].filter(Boolean);

function proxied(prefix, url){
  return prefix + encodeURIComponent(url);
}

async function playMediaUrl(url){
  vid.setAttribute('crossorigin', 'anonymous');

  try {
    await loadIntoVideoElement(url, '');
    setCrtFallback(false);
    return;
  } catch (err){
    console.warn('Direct playback with CORS requested failed; trying CORS proxies next:', err);
  }

  for (const prefix of CORS_PROXIES){
    try {
      await loadIntoVideoElement(url, prefix);
      setCrtFallback(false);
      return;
    } catch (err){
      console.warn(`CORS proxy (${prefix}) failed too, trying the next one:`, err);
    }
  }

  console.warn('All CORS proxies failed; falling back to direct playback without CORS (skips the CRT effect for this source).');
  vid.removeAttribute('crossorigin');
  await loadIntoVideoElement(url, ''); // last resort — let this one throw normally if it also fails
  setCrtFallback(true);
}

async function tuneToChannel(index){
  if (!channelList || !channelList[index]) return;
  channelIndex = index;
  const ch = channelList[index];
  streamStatus.textContent = 'Loading ' + ch.name + '…';
  try {
    await playMediaUrl(ch.url);
    streamStatus.textContent = 'Playing: ' + ch.name + (crtFallbackActive ? ' (no CRT effect — source doesn\'t support it)' : '');
  } catch (err){
    console.error('Failed to tune channel:', ch.name, err);
    streamStatus.textContent = 'Couldn\'t load "' + ch.name + '"';
  }
}

// Up/Down at the TV step through a loaded channel list.
function changeChannelBy(delta){
  if (!channelList || channelList.length < 2) return;
  const next = (channelIndex + delta + channelList.length) % channelList.length;
  channelShownAt = performance.now();
  flashStatic(350);
  tuneToChannel(next);
}

async function loadStreamUrl(url){
  url = url.trim();
  if (!url) return;
  rememberRecentSource(url);
  streamStatus.textContent = 'Loading…';
  flashStatic(350);
  channelList = null;

  // If this looks like an m3u/m3u8 link, fetch it to check if it's a
  // multi-channel list vs a single stream. Falls through to playMediaUrl()
  // on fetch failure (e.g. CORS).
  if (looksLikeM3U(url)){
    try {
      const res = await fetch(url);
      const text = await res.text();
      const parsed = parseChannelList(text);
      if (parsed){
        channelList = parsed;
        await tuneToChannel(0);
        return;
      }
    } catch (err){
      console.warn('Could not fetch playlist to check for a channel list (likely CORS) — trying direct playback:', err);
    }
  }

  try {
    await playMediaUrl(url);
    streamStatus.textContent = 'Playing' + (crtFallbackActive ? ' (no CRT effect — source doesn\'t support it)' : '');
  } catch (err){
    console.error('Failed to load stream:', err);
    streamStatus.textContent = 'Couldn\'t load that link';
  }
}

document.getElementById('streamLoadBtn').addEventListener('click', () => loadStreamUrl(streamUrlInput.value));
streamUrlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') loadStreamUrl(streamUrlInput.value);
});

// At the TV, Up/Down (+ W/S, Z for AZERTY) step through a loaded channel list.
document.addEventListener('keydown', (e) => {
  if (mode !== 'tv') return;
  switch (e.code){
    case 'ArrowUp': case 'KeyW': case 'KeyZ':
      changeChannelBy(1);
      break;
    case 'ArrowDown': case 'KeyS':
      changeChannelBy(-1);
      break;
  }
});

// Smoothly animates the camera between free-roam and TV view instead of snapping.
const TRANSITION_DURATION = 0.6; // seconds
let transitionT = 1; // 1 = idle/finished
let pendingMode = null;
const transitionFrom = { pos: new THREE.Vector3(), quat: new THREE.Quaternion(), viewSize: ISO_ORTHO_VIEW_SIZE_BASE };
const transitionTo = { pos: new THREE.Vector3(), quat: new THREE.Quaternion(), viewSize: ISO_ORTHO_VIEW_SIZE_BASE };
const lookAtMatrix = new THREE.Matrix4();

function quatLookingAt(fromPos, toPos){
  lookAtMatrix.lookAt(fromPos, toPos, camera.up);
  return new THREE.Quaternion().setFromRotationMatrix(lookAtMatrix);
}

// Actual visible size combines frustum bounds with camera.zoom — reads
// off the current effective size so a transition starts with no jump.
function currentEffectiveViewSize(){
  if (mode === 'tv') return TV_ORTHO_VIEW_SIZE / camera.zoom;
  return ISO_ORTHO_VIEW_SIZE_BASE * isoZoom;
}

function startTransition(toPos, toQuat, finalMode, toViewSize){
  transitionFrom.pos.copy(camera.position);
  transitionFrom.quat.copy(camera.quaternion);
  transitionFrom.viewSize = currentEffectiveViewSize();
  // Neutralize any TV dolly zoom for the duration of the flight — from here
  // on, frustum size alone carries the "how zoomed in" information, so it
  // can be lerped like any other property. Reapplying the just-computed
  // effective size keeps the framing exactly as it was the instant before.
  camera.zoom = 1;
  setOrthoFrustum(transitionFrom.viewSize);
  transitionTo.pos.copy(toPos);
  transitionTo.quat.copy(toQuat);
  transitionTo.viewSize = toViewSize;
  transitionT = 0;
  pendingMode = finalMode;
  mode = 'transitioning';
  tvControls.enabled = false;
  streamPanel.style.display = 'none';
}

function updateTransition(delta){
  transitionT = Math.min(transitionT + delta / TRANSITION_DURATION, 1);
  const eased = transitionT * transitionT * (3 - 2 * transitionT); // smoothstep
  camera.position.lerpVectors(transitionFrom.pos, transitionTo.pos, eased);
  camera.quaternion.slerpQuaternions(transitionFrom.quat, transitionTo.quat, eased);
  setOrthoFrustum(THREE.MathUtils.lerp(transitionFrom.viewSize, transitionTo.viewSize, eased));
  if (transitionT >= 1) finishTransition();
}

function finishTransition(){
  if (pendingMode === 'tv'){
    mode = 'tv';
    tvControls.target.set(savedTVCamera.targetX, savedTVCamera.height, savedTVCamera.targetZ);
    // Restore the persisted dolly zoom now that the flight has landed —
    // combined with the raw TV_ORTHO_VIEW_SIZE bounds this reproduces
    // exactly the effective size the flight just eased into.
    camera.zoom = savedTVCamera.zoom;
    setOrthoFrustum(TV_ORTHO_VIEW_SIZE);
    tvControls.enabled = true;
    tvControls.update();
    streamPanel.style.display = 'block';
  } else {
    mode = 'freeroam';
    setOrthoFrustum(ISO_ORTHO_VIEW_SIZE_BASE * isoZoom); // zoom is always 1 here, already true — just re-affirm precisely
  }
  pendingMode = null;
}

function enterTVMode(){
  const toPos = new THREE.Vector3(savedTVCamera.targetX, savedTVCamera.height, savedTVCamera.targetZ + savedTVCamera.distance);
  const toTarget = new THREE.Vector3(savedTVCamera.targetX, savedTVCamera.height, savedTVCamera.targetZ);
  const toQuat = quatLookingAt(toPos, toTarget);
  startTransition(toPos, toQuat, 'tv', TV_ORTHO_VIEW_SIZE / savedTVCamera.zoom);
}

function exitTVMode(){
  tvControls.enabled = false;
  // Head back to wherever the iso view's fixed pose currently is (it never
  // stopped tracking isoAzimuthDeg/isoPanOffset while we were in TV mode, so
  // this is exactly the corner/pan the person left). writeToCamera=false
  // since `camera` is still showing the TV view right up until the flight
  // starts — this only refreshes the scratch isoPose to read from.
  applyIsoCameraPose(isoAzimuthDeg, false);
  startTransition(isoPose.position, isoPose.quaternion, 'freeroam', ISO_ORTHO_VIEW_SIZE_BASE * isoZoom);
}

function lockAndReportCamera(){
  if (mode === 'tv'){
    // Force out any horizontal drift from diagonal drags.
    camera.position.x = savedTVCamera.targetX;
    tvControls.target.x = savedTVCamera.targetX;
    tvControls.target.z = savedTVCamera.targetZ;

    savedTVCamera.height = camera.position.y;
    savedTVCamera.distance = camera.position.distanceTo(tvControls.target);
    savedTVCamera.zoom = camera.zoom;

    if (placementMode){
      const height = camera.position.y.toFixed(2);
      const distance = camera.position.distanceTo(tvControls.target).toFixed(2);
      camHud.style.display = '';
      camHud.textContent = `camera height: ${height}\ncamera distance: ${distance}`;
    } else {
      camHud.style.display = 'none';
    }
  } else if (mode === 'freeroam') {
    // Coords/placement HUD is debug info — kept hidden unless placement
    // mode is on (press P), so it doesn't clutter normal viewing.
    if (placementMode && placeableItems.length > 0){
      const p = camera.position;
      const item = placeableItems[activeItemIndex];
      let text = `x: ${p.x.toFixed(1)}  y: ${p.y.toFixed(1)}  z: ${p.z.toFixed(1)}`;
      text += `\n--- Placement (P to toggle, Tab to switch item) ---`;
      text += `\nEditing: ${item.name} (${activeItemIndex + 1}/${placeableItems.length})`;
      text += `\nposition: (${item.placement.x.toFixed(1)}, ${item.placement.y.toFixed(1)}, ${item.placement.z.toFixed(1)})`;
      text += `\nrotationY: ${item.rotationY.toFixed(2)}`;
      text += `\nIJKL: move · U/O: height · N/M: rotate · Tab: switch item`;
      camHud.style.display = '';
      camHud.textContent = text;
    } else {
      camHud.style.display = 'none';
    }
  }
  // mode === 'transitioning': leave the HUD as it was, nothing to report mid-flight
}

// ---- Overscan: real CRTs shrink the raster inward from each edge, revealing
// black border rather than cropping/zooming the picture. We composite the
// CRT-shader output onto a second canvas at a smaller size, offset so it's
// inset from whichever edges are dialed in, with black filling the rest.
// That padded canvas — not crtCanvas directly — is what becomes the texture.
//
// Live-adjustable: press B to toggle "overscan adjust mode" (mirrors P for
// placement mode — the two are mutually exclusive so IJKL/UO/NM aren't
// double-booked). While it's on:
//   I / K  — top edge:    less / more
//   U / O  — bottom edge: less / more
//   J / L  — left edge:   less / more
//   N / M  — right edge:  less / more
// The HUD shows the running values — once it looks right, copy those
// numbers into the `overscan` object below.
const paddedCanvas = document.createElement('canvas');
paddedCanvas.width = crtCanvas.width;
paddedCanvas.height = crtCanvas.height;
const paddedCtx = paddedCanvas.getContext('2d');

const overscan = { top: 0, bottom: 0.10, left: 0, right: 0.03 };

let overscanAdjustMode = false;
const OVERSCAN_ADJUST_SPEED = 0.1; // fraction of screen / second
const OVERSCAN_MIN = 0, OVERSCAN_MAX = 0.4;
const overscanState = { topInc: false, topDec: false, bottomInc: false, bottomDec: false, leftInc: false, leftDec: false, rightInc: false, rightDec: false };

function onOverscanKeyDown(e){
  if (e.code === 'KeyB'){ overscanAdjustMode = !overscanAdjustMode; if (overscanAdjustMode) placementMode = false; return; }
  if (!overscanAdjustMode) return;
  switch (e.code){
    case 'KeyI': overscanState.topDec = true; e.preventDefault(); break;
    case 'KeyK': overscanState.topInc = true; e.preventDefault(); break;
    case 'KeyU': overscanState.bottomDec = true; e.preventDefault(); break;
    case 'KeyO': overscanState.bottomInc = true; e.preventDefault(); break;
    case 'KeyJ': overscanState.leftDec = true; e.preventDefault(); break;
    case 'KeyL': overscanState.leftInc = true; e.preventDefault(); break;
    case 'KeyN': overscanState.rightDec = true; break;
    case 'KeyM': overscanState.rightInc = true; break;
  }
}
function onOverscanKeyUp(e){
  switch (e.code){
    case 'KeyI': overscanState.topDec = false; break;
    case 'KeyK': overscanState.topInc = false; break;
    case 'KeyU': overscanState.bottomDec = false; break;
    case 'KeyO': overscanState.bottomInc = false; break;
    case 'KeyJ': overscanState.leftDec = false; break;
    case 'KeyL': overscanState.leftInc = false; break;
    case 'KeyN': overscanState.rightDec = false; break;
    case 'KeyM': overscanState.rightInc = false; break;
  }
}
document.addEventListener('keydown', onOverscanKeyDown);
document.addEventListener('keyup', onOverscanKeyUp);

function clampOverscan(v){ return Math.min(OVERSCAN_MAX, Math.max(OVERSCAN_MIN, v)); }

function updateOverscanAdjust(delta){
  if (!overscanAdjustMode) return;
  const step = OVERSCAN_ADJUST_SPEED * delta;
  if (overscanState.topDec) overscan.top = clampOverscan(overscan.top - step);
  if (overscanState.topInc) overscan.top = clampOverscan(overscan.top + step);
  if (overscanState.bottomDec) overscan.bottom = clampOverscan(overscan.bottom - step);
  if (overscanState.bottomInc) overscan.bottom = clampOverscan(overscan.bottom + step);
  if (overscanState.leftDec) overscan.left = clampOverscan(overscan.left - step);
  if (overscanState.leftInc) overscan.left = clampOverscan(overscan.left + step);
  if (overscanState.rightDec) overscan.right = clampOverscan(overscan.right - step);
  if (overscanState.rightInc) overscan.right = clampOverscan(overscan.right + step);
}

function drawPaddedFrame(){
  const w = paddedCanvas.width, h = paddedCanvas.height;
  paddedCtx.fillStyle = '#000';
  paddedCtx.fillRect(0, 0, w, h);

  const left = overscan.left * w;
  const right = overscan.right * w;
  const top = overscan.top * h;
  const bottom = overscan.bottom * h;
  const dw = Math.max(1, w - left - right);
  const dh = Math.max(1, h - top - bottom);

  paddedCtx.drawImage(crtCanvas, left, top, dw, dh);
}

const screenTexture = new THREE.CanvasTexture(paddedCanvas);
screenTexture.colorSpace = THREE.SRGBColorSpace;
screenTexture.minFilter = THREE.LinearFilter;
screenTexture.magFilter = THREE.LinearFilter;
// This mesh's "Screen" UVs are authored the opposite way from three.js's
// default texture convention, so the default flipY=true was flipping the
// whole picture vertically — subtle on symmetric shapes (the "H" in the
// channel OSD looks the same either way), obvious on anything else (digits
// upside-down, and the top-right-anchored OSD landing bottom-right instead).
screenTexture.flipY = false;

let screenMesh = null;
let tvModel = null;
let tvOutlineMesh = null;

// ---- "Inverted hull" toon outline ----
// Classic cartoon-outline trick: render a second copy of the mesh, pushed
// outward a hair along each vertex's own normal, with only its back faces
// visible (front faces culled). Depth-testing then does the work for us —
// the enlarged backfaces only peek out right at the model's silhouette edge,
// reading as a clean outline that follows the object's actual shape instead
// of a bounding box.
const outlineMaterial = new THREE.ShaderMaterial({
  uniforms: { outlineWidth: { value: 0.3 } },
  vertexShader: `
    uniform float outlineWidth;
    void main(){
      vec3 pos = position + normal * outlineWidth;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,
  fragmentShader: `
    void main(){
      gl_FragColor = vec4(1.0, 1.0, 1.0, 1.0);
    }
  `,
  side: THREE.BackSide
});

// ---- TV, loaded from TV.glb ----
// Self-contained now — PBR body textures, glass, and the glowing screen
// material are all embedded in the file, so no textures/ folder is needed.
// The screen is the mesh using material ".003" in this export: a black
// base color plus an emissive map, which is how the "powered on" glow was
// authored. Matched by that name first (fast path for this exact file),
// falling back to the same black-base/emissive-map heuristic in case a
// future re-export renames it.
const tvLoader = new GLTFLoader();
tvLoader.load('TV.glb', (gltf) => {
  const model = gltf.scene;

  model.traverse((child) => {
    if (!child.isMesh || !child.material) return;
    const mat = child.material;
    const looksLikeScreen = mat.name === '.003' || (mat.emissiveMap && !mat.map);
    if (looksLikeScreen) screenMesh = child;
  });

  if (screenMesh) {
    screenMesh.material = new THREE.MeshBasicMaterial({
      map: screenTexture,
      toneMapped: false
    });
  } else {
    console.warn('Could not find the TV screen mesh — logging meshes/materials below.');
    model.traverse((child) => { if (child.isMesh) console.log('mesh:', child.name, 'material:', child.material && child.material.name); });
  }

  const box = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3();
  box.getSize(size);
  const center = new THREE.Vector3();
  box.getCenter(center);
  // Centering fix: this glTF export bakes a real offset into its mesh
  // nodes (one piece sits ~2 units off in Z, for example), so the model's
  // true visual center is nowhere near its own local origin. Previously we
  // shifted model.position by -center, but rotation is applied to a
  // node's children in *local* space before that position offset — so the
  // TV was rotating around its untouched, off-center local origin, not
  // its visual center (hence the "orbiting around something invisible").
  // Fix: shift each top-level child by -center instead, so the geometry
  // itself ends up centered on the model's local origin. Now model.rotation
  // (set below via registerPlaceable) pivots around the true center, and
  // model.position is free to be used purely for placement.
  model.children.forEach((child) => child.position.sub(center));

  const maxDim = Math.max(size.x, size.y, size.z);
  const targetSize = 40;
  const scale = targetSize / maxDim;
  model.scale.setScalar(scale);

  tvModel = model;
  scene.add(model);
  registerPlaceable('TV', model, TV_POSITION, TV_ROTATION_Y);

  // Hover feedback: a cloned copy of the TV, rendered with the outline
  // shader above, toggled on/off in the mousemove handler below. outlineWidth
  // is expressed in the model's native (pre-scale) units, same as maxDim, so
  // it scales correctly regardless of the model's native size.
  tvOutlineMesh = model.clone(true);
  tvOutlineMesh.traverse((child) => {
    if (child.isMesh) child.material = outlineMaterial;
  });
  outlineMaterial.uniforms.outlineWidth.value = maxDim * 0.02;
  tvOutlineMesh.visible = false;
  scene.add(tvOutlineMesh);

  // Set up the screen glow light only now, after the model's final position
  // and scale are applied — the light is parented to the scene (not the
  // mesh), so it needs the mesh's finished world-space transform.
  if (screenMesh) {
    model.updateMatrixWorld(true);
    setupScreenGlow(screenMesh);
  }

  document.getElementById('loading').style.display = 'none';
}, undefined, (err) => {
  console.error('Error loading TV.glb:', err);
  document.getElementById('loading').textContent = 'Failed to load TV model — check console.';
});
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let pointerDownAt = 0, pointerDownPos = new THREE.Vector2();

function onPointerDown(e){
  pointerDownAt = performance.now();
  pointerDownPos.set(e.clientX, e.clientY);
}

function raycastFromClient(x, y, target){
  pointer.x = (x / window.innerWidth) * 2 - 1;
  pointer.y = -(y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  return raycaster.intersectObject(target, true);
}

// Hover feedback for the TV outline — the cursor is always free (never
// pointer-locked), so "hover" is simply whatever's under the free mouse
// cursor right now.
let lastMouseX = window.innerWidth / 2, lastMouseY = window.innerHeight / 2;
renderer.domElement.addEventListener('pointermove', (e) => {
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
});

function updateTVHoverOutline(){
  if (!tvModel || !tvOutlineMesh) return;
  if (mode !== 'freeroam'){
    tvOutlineMesh.visible = false;
    return;
  }
  const hits = raycastFromClient(lastMouseX, lastMouseY, tvModel);
  tvOutlineMesh.visible = hits.length > 0;
}

function onPointerUp(e){
  const dt = performance.now() - pointerDownAt;
  const dx = e.clientX - pointerDownPos.x, dy = e.clientY - pointerDownPos.y;
  if (dt > 350 || Math.hypot(dx, dy) > 6) return; // was a drag, not a click
  if (!tvModel) return;
  if (mode === 'transitioning') return;

  if (mode === 'tv'){
    const tvHits = raycastFromClient(e.clientX, e.clientY, tvModel);
    if (tvHits.length === 0){
      exitTVMode();
      return;
    }
    if (screenMesh && tvHits.some(h => h.object === screenMesh)){
      surfChannel();
    }
    return;
  }

  // mode === 'freeroam': click the TV to zoom in; click anywhere else does
  // nothing now that there's no more walking to trigger.
  const tvHits = raycastFromClient(e.clientX, e.clientY, tvModel);
  if (tvHits.length > 0) enterTVMode();
}
renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointerup', onPointerUp);

window.addEventListener('resize', () => {
  setOrthoFrustum(lastRawViewSize);
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  const delta = clock.getDelta();

  if (!crtFallbackActive){
    drawCRTFrame();
    updateOverscanAdjust(delta);
    drawPaddedFrame();
    screenTexture.needsUpdate = true;
    updateScreenGlow();
  }
  if (tvOutlineMesh && tvModel){
    tvOutlineMesh.position.copy(tvModel.position);
    tvOutlineMesh.rotation.copy(tvModel.rotation);
    tvOutlineMesh.scale.copy(tvModel.scale);
  }
  updateTVHoverOutline();

  if (mode === 'tv'){
    tvControls.enablePan = placementMode;
    tvControls.update();
  } else if (mode === 'freeroam'){
    updateFreeRoam(delta);
    updatePlacement(delta);
  } else if (mode === 'transitioning'){
    updateTransition(delta);
  }
  lockAndReportCamera();
  if (overscanAdjustMode){
    let text = `--- Overscan adjust (B to toggle) ---`;
    text += `\ntop: ${overscan.top.toFixed(2)}   bottom: ${overscan.bottom.toFixed(2)}`;
    text += `\nleft: ${overscan.left.toFixed(2)}   right: ${overscan.right.toFixed(2)}`;
    text += `\nI/K: top -/+   U/O: bottom -/+   J/L: left -/+   N/M: right -/+`;
    camHud.style.display = '';
    camHud.textContent = text;
  }
  renderer.render(scene, camera);
}
renderer.setAnimationLoop(animate);
</script>
</body>
</html>
