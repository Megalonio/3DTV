/*
// ---- Arcade cabinet screen ----
// This model's screen isn't its own mesh/material the way the TV's is — the
// whole cabinet (body, bezel, screen, everything) is one continuous surface
// sharing one texture atlas, with the screen artwork just baked into one
// small rectangle of it. So instead of swapping a material, we clone that
// atlas's baseColor + emissive images onto our own canvases once, and every
// frame redraw just that rectangle with the live CRT feed — the rest of the
// cabinet's art stays exactly as exported.
//
// That rectangle's UV mapping runs rotated relative to the cabinet's actual
// physical axes (found by tracing which vertices share that part of the
// atlas) — a normal side effect of how the unwrap was packed, not something
// we can just read off the model. So the video patch needs a matching
// rotation/flip to land right-side-up, and there's no way to derive that
// blind — press C to cycle rotation in 90° steps, V to flip horizontally,
// X to flip vertically, and check how it looks. The HUD shows the current
// combination; once it's right, report the values back to get them
// hardcoded as the default.
const ARCADE_SCREEN_UV = { u0: 0.7218, u1: 0.7926, v0: 0.6077, v1: 0.8260 };
let arcadeScreenRotation = 0; // degrees: 0, 90, 180, or 270
let arcadeScreenFlipH = false;
let arcadeScreenFlipV = false;

let arcadeBaseColorCanvas = null, arcadeBaseColorCtx = null, arcadeBaseColorTexture = null;
let arcadeEmissiveCanvas = null, arcadeEmissiveCtx = null, arcadeEmissiveTexture = null;

function setupArcadeScreen(cabinetMesh){
  const mat = cabinetMesh.material;
  const baseImg = mat.map ? mat.map.image : null;
  const emisImg = mat.emissiveMap ? mat.emissiveMap.image : null;
  if (!baseImg || !emisImg){
    console.warn('Arcade cabinet material is missing its baseColor/emissive textures — screen patch skipped.');
    return;
  }

  arcadeBaseColorCanvas = document.createElement('canvas');
  arcadeBaseColorCanvas.width = baseImg.width;
  arcadeBaseColorCanvas.height = baseImg.height;
  arcadeBaseColorCtx = arcadeBaseColorCanvas.getContext('2d');
  arcadeBaseColorCtx.drawImage(baseImg, 0, 0);

  arcadeEmissiveCanvas = document.createElement('canvas');
  arcadeEmissiveCanvas.width = emisImg.width;
  arcadeEmissiveCanvas.height = emisImg.height;
  arcadeEmissiveCtx = arcadeEmissiveCanvas.getContext('2d');
  arcadeEmissiveCtx.drawImage(emisImg, 0, 0);

  arcadeBaseColorTexture = new THREE.CanvasTexture(arcadeBaseColorCanvas);
  arcadeBaseColorTexture.colorSpace = THREE.SRGBColorSpace;
  arcadeBaseColorTexture.flipY = false; // match how GLTFLoader loaded the original (see the TV's screenTexture.flipY fix above for why)
  arcadeBaseColorTexture.minFilter = THREE.LinearFilter;
  arcadeBaseColorTexture.magFilter = THREE.LinearFilter;

  arcadeEmissiveTexture = new THREE.CanvasTexture(arcadeEmissiveCanvas);
  arcadeEmissiveTexture.colorSpace = THREE.SRGBColorSpace;
  arcadeEmissiveTexture.flipY = false;
  arcadeEmissiveTexture.minFilter = THREE.LinearFilter;
  arcadeEmissiveTexture.magFilter = THREE.LinearFilter;

  mat.map = arcadeBaseColorTexture;
  mat.emissiveMap = arcadeEmissiveTexture;
  mat.needsUpdate = true;
}

function drawArcadeScreenPatch(){
  if (!arcadeBaseColorCtx || !arcadeEmissiveCtx) return;

  const drawInto = (ctx, w, h, blackout) => {
    const x0 = ARCADE_SCREEN_UV.u0 * w;
    const x1 = ARCADE_SCREEN_UV.u1 * w;
    const y0 = ARCADE_SCREEN_UV.v0 * h;
    const y1 = ARCADE_SCREEN_UV.v1 * h;
    const pw = x1 - x0, ph = y1 - y0;

    ctx.save();
    ctx.translate(x0 + pw / 2, y0 + ph / 2);
    ctx.rotate(arcadeScreenRotation * Math.PI / 180);
    ctx.scale(arcadeScreenFlipH ? -1 : 1, arcadeScreenFlipV ? -1 : 1);
    // A 90/270 rotation swaps which patch dimension the video's width vs
    // height land on — swap dw/dh to match so the picture isn't stretched.
    const rotated90 = (arcadeScreenRotation % 180) !== 0;
    const dw = rotated90 ? ph : pw;
    const dh = rotated90 ? pw : ph;
    if (blackout){
      ctx.fillStyle = '#000';
      ctx.fillRect(-dw / 2, -dh / 2, dw, dh);
    } else {
      ctx.drawImage(paddedCanvas, -dw / 2, -dh / 2, dw, dh);
    }
    ctx.restore();
  };

  // Base color gets blacked out under the patch (like the TV glass's black
  // base) so the video doesn't ghost against the cabinet's original baked
  // screenshot artwork; emissive gets the actual live picture.
  drawInto(arcadeBaseColorCtx, arcadeBaseColorCanvas.width, arcadeBaseColorCanvas.height, true);
  drawInto(arcadeEmissiveCtx, arcadeEmissiveCanvas.width, arcadeEmissiveCanvas.height, false);

  arcadeBaseColorTexture.needsUpdate = true;
  arcadeEmissiveTexture.needsUpdate = true;
}

function onArcadeScreenOrientKeyDown(e){
  switch (e.code){
    case 'KeyC': arcadeScreenRotation = (arcadeScreenRotation + 90) % 360; break;
    case 'KeyV': arcadeScreenFlipH = !arcadeScreenFlipH; break;
    case 'KeyX': arcadeScreenFlipV = !arcadeScreenFlipV; break;
    default: return;
  }
  camHud.style.display = '';
  camHud.textContent = `arcade screen orient — rotation: ${arcadeScreenRotation}  flipH: ${arcadeScreenFlipH}  flipV: ${arcadeScreenFlipV}\n(C: rotate 90°, V: flip horizontal, X: flip vertical)`;
}
document.addEventListener('keydown', onArcadeScreenOrientKeyDown);

// ---- Arcade cabinet, loaded from Arcade.glb ----

*/

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let pointerDownAt = 0, pointerDownPos = new THREE.Vector2();

function onPointerDown(e){
  pointerDownAt = performance.now();
  pointerDownPos.set(e.clientX, e.clientY);
}

function raycastFromClient(x, y, target){
  pointer.x = (x / window.innerWidth) * 2 - 1;
  pointer.y = -(y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  return raycaster.intersectObject(target, true);
}

// Hover feedback for the TV outline — the cursor is always free (never
// pointer-locked), so "hover" is simply whatever's under the free mouse
// cursor right now.
let lastMouseX = window.innerWidth / 2, lastMouseY = window.innerHeight / 2;
renderer.domElement.addEventListener('pointermove', (e) => {
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
});

function updateTVHoverOutline(){
  if (!tvModel || !tvOutlineMesh) return;
  if (mode !== 'freeroam'){
    tvOutlineMesh.visible = false;
    return;
  }
  const hits = raycastFromClient(lastMouseX, lastMouseY, tvModel);
  tvOutlineMesh.visible = hits.length > 0;
}

function onPointerUp(e){
  const dt = performance.now() - pointerDownAt;
  const dx = e.clientX - pointerDownPos.x, dy = e.clientY - pointerDownPos.y;
  if (dt > 350 || Math.hypot(dx, dy) > 6) return; // was a drag, not a click
  if (!tvModel) return;
  if (mode === 'transitioning') return;

  if (mode === 'tv'){
    const tvHits = raycastFromClient(e.clientX, e.clientY, tvModel);
    if (tvHits.length === 0){
      if (!ANDROID_TV_LOCKED) exitTVMode();
      return;
    }
    if (screenMesh && tvHits.some(h => h.object === screenMesh)){
      surfChannel();
    }
    return;
  }

  // mode === 'freeroam': click the TV to zoom in; click anywhere else does
  // nothing now that there's no more walking to trigger.
  const tvHits = raycastFromClient(e.clientX, e.clientY, tvModel);
  if (tvHits.length > 0) enterTVMode();
}
renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointerup', onPointerUp);

window.addEventListener('resize', () => {
  setOrthoFrustum(lastRawViewSize);
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  const delta = clock.getDelta();

  if (!crtFallbackActive){
    drawCRTFrame();
    updateOverscanAdjust(delta);
    drawPaddedFrame();
    // drawArcadeScreenPatch(); // arcade cabinet is disabled for now, see comment block above its loader
    screenTexture.needsUpdate = true;
    updateScreenGlow();
  }
  if (tvOutlineMesh && tvModel){
    tvOutlineMesh.position.copy(tvModel.position);
    tvOutlineMesh.rotation.copy(tvModel.rotation);
    tvOutlineMesh.scale.copy(tvModel.scale);
  }
  updateTVHoverOutline();

  if (mode === 'tv'){
    tvControls.update();
  } else if (mode === 'freeroam'){
    updateFreeRoam(delta);
    updatePlacement(delta);
  } else if (mode === 'transitioning'){
    updateTransition(delta);
  }
  lockAndReportCamera();
  if (overscanAdjustMode){
    let text = `--- Overscan adjust (B to toggle) ---`;
    text += `\ntop: ${overscan.top.toFixed(2)}   bottom: ${overscan.bottom.toFixed(2)}`;
    text += `\nleft: ${overscan.left.toFixed(2)}   right: ${overscan.right.toFixed(2)}`;
    text += `\nI/K: top -/+   U/O: bottom -/+   J/L: left -/+   N/M: right -/+`;
    camHud.style.display = '';
    camHud.textContent = text;
  }
  renderer.render(scene, camera);
}
renderer.setAnimationLoop(animate);
</script>
